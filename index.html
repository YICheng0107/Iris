<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Iris 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fdf6f9;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    cursor: pointer;
  }

  /* Soft pastel bg blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .bg-blob.b1 { width: 400px; height: 400px; background: #fce4ec; top: -100px; left: -100px; opacity: 0.35; }
  .bg-blob.b2 { width: 300px; height: 300px; background: #e3f2fd; bottom: -80px; right: -60px; opacity: 0.3; }
  .bg-blob.b3 { width: 250px; height: 250px; background: #f3e5f5; bottom: 100px; left: -60px; opacity: 0.28; }

  #scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 30px 20px 40px;
  }

  /* Title */
  .title {
    font-family: 'Pacifico', cursive;
    font-size: 32px;
    color: #9c6b4e;
    text-align: center;
    margin-bottom: 2px;
    text-shadow: 2px 3px 0 #e8d5c4;
    animation: titlePop 0.7s cubic-bezier(.36,1.56,.64,1) both;
  }
  .subtitle {
    display: none;
  }
  @keyframes titlePop {
    from { opacity: 0; transform: scale(0.6) rotate(-4deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* CAKE */
  #cake-svg {
    display: block;
    filter: drop-shadow(0 8px 24px rgba(232,93,138,0.18));
    animation: cakeIn 0.8s cubic-bezier(.36,1.56,.64,1) 0.1s both;
    transition: transform 0.2s;
  }
  #cake-svg:hover { transform: scale(1.03); }
  @keyframes cakeIn {
    from { opacity: 0; transform: scale(0.5) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Flame animation */
  .flame-outer { animation: flicker 0.45s infinite alternate ease-in-out; transform-origin: 50% 100%; }
  .flame-inner { animation: flicker 0.3s infinite alternate-reverse ease-in-out; transform-origin: 50% 100%; }
  @keyframes flicker {
    from { transform: scaleX(1) scaleY(1) skewX(-3deg); }
    to   { transform: scaleX(0.82) scaleY(1.12) skewX(4deg); }
  }

  .flame-g { transition: opacity 0.35s ease; }
  .flame-g.blown { opacity: 0 !important; }
  .smoke-path { opacity: 0; }
  .smoke-path.show { animation: smokeUp 1.2s ease-out forwards; }
  @keyframes smokeUp {
    0%   { opacity: 0.5; transform: translateY(0) scaleX(1); }
    100% { opacity: 0; transform: translateY(-28px) scaleX(2.5); }
  }

  /* Hint text */
  #hint {
    margin-top: 14px;
    font-size: 13px;
    color: #b8957a;
    letter-spacing: 0.5px;
    opacity: 0.8;
    transition: opacity 0.4s;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  #hint.hide { opacity: 0; }



  /* Confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    border-radius: 3px;
    animation: confFall linear forwards;
  }
  @keyframes confFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(800deg); opacity: 0; }
  }

  /* Sparkle stars */
  .sparkle-star {
    position: fixed;
    pointer-events: none;
    z-index: 998;
    animation: sparkleOut 0.8s ease-out forwards;
    font-size: 18px;
  }
  @keyframes sparkleOut {
    0%   { opacity: 1; transform: scale(0) rotate(0deg); }
    60%  { opacity: 1; transform: scale(1.3) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<div id="scene">
  <div class="title">Happy Birthday, Iris 🎂</div>

  <svg id="cake-svg" width="260" height="310" viewBox="0 0 260 310" xmlns="http://www.w3.org/2000/svg" onclick="toggleCake()">

    <!-- Shadow -->
    <ellipse cx="130" cy="300" rx="90" ry="8" fill="rgba(232,93,138,0.12)"/>

    <!-- ===== BOTTOM TIER ===== -->
    <!-- Base shape -->
    <rect x="30" y="195" width="200" height="80" rx="16" fill="#ffa0bb"/>
    <!-- Top frosting strip -->
    <rect x="30" y="195" width="200" height="20" rx="8" fill="#ff6d9e"/>
    <!-- Wavy cream on top of bottom tier -->
    <path d="M30 198 Q45 188 60 198 Q75 208 90 198 Q105 188 120 198 Q135 208 150 198 Q165 188 180 198 Q195 208 210 198 Q225 188 230 198" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
    <!-- Decorative bows / flowers -->
    <!-- Flower 1 -->
    <circle cx="68" cy="228" r="10" fill="#ff85b3" opacity="0.5"/>
    <circle cx="68" cy="218" r="6" fill="#ffb3d0"/>
    <circle cx="78" cy="224" r="6" fill="#ffb3d0"/>
    <circle cx="58" cy="224" r="6" fill="#ffb3d0"/>
    <circle cx="75" cy="233" r="6" fill="#ffb3d0"/>
    <circle cx="61" cy="233" r="6" fill="#ffb3d0"/>
    <circle cx="68" cy="226" r="5" fill="#fff0f6"/>
    <!-- Flower 2 -->
    <circle cx="132" cy="228" r="10" fill="#a78bfa" opacity="0.4"/>
    <circle cx="132" cy="218" r="6" fill="#c4b5fd"/>
    <circle cx="142" cy="224" r="6" fill="#c4b5fd"/>
    <circle cx="122" cy="224" r="6" fill="#c4b5fd"/>
    <circle cx="139" cy="233" r="6" fill="#c4b5fd"/>
    <circle cx="125" cy="233" r="6" fill="#c4b5fd"/>
    <circle cx="132" cy="226" r="5" fill="#f5f0ff"/>
    <!-- Flower 3 -->
    <circle cx="196" cy="228" r="10" fill="#34d399" opacity="0.35"/>
    <circle cx="196" cy="218" r="6" fill="#6ee7b7"/>
    <circle cx="206" cy="224" r="6" fill="#6ee7b7"/>
    <circle cx="186" cy="224" r="6" fill="#6ee7b7"/>
    <circle cx="203" cy="233" r="6" fill="#6ee7b7"/>
    <circle cx="189" cy="233" r="6" fill="#6ee7b7"/>
    <circle cx="196" cy="226" r="5" fill="#f0fff8"/>

    <!-- ===== MIDDLE TIER ===== -->
    <rect x="58" y="140" width="144" height="62" rx="13" fill="#ffb8d1"/>
    <rect x="58" y="140" width="144" height="17" rx="7" fill="#ff8cb8"/>
    <!-- Wavy cream -->
    <path d="M58 143 Q70 134 83 143 Q96 152 109 143 Q122 134 135 143 Q148 152 161 143 Q174 134 187 143 Q198 152 202 143" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- Heart deco -->
    <path d="M118 172 C118 167 111 163 108 167 C105 172 111 178 118 185 C125 178 131 172 128 167 C125 163 118 167 118 172Z" fill="#fff" opacity="0.75"/>
    <!-- Star deco -->
    <path d="M158 165 l3 6 l6.5 0.5 l-5 4.5 l1.5 6.5 l-6-3.5 l-6 3.5 l1.5-6.5 l-5-4.5 l6.5-0.5Z" fill="#fffbe6" opacity="0.8"/>

    <!-- ===== TOP TIER ===== -->
    <rect x="86" y="92" width="88" height="54" rx="11" fill="#ffd6e8"/>
    <rect x="86" y="92" width="88" height="14" rx="6" fill="#ffaece"/>
    <!-- Wavy cream -->
    <path d="M86 95 Q96 87 107 95 Q118 103 129 95 Q140 87 151 95 Q161 103 174 95" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- Star tiny -->
    <path d="M130 120 l2 4.5 l4.8 0.4 l-3.6 3.3 l1.1 4.8 l-4.3-2.6 l-4.3 2.6 l1.1-4.8 l-3.6-3.3 l4.8-0.4Z" fill="#ff85b3" opacity="0.7"/>

    <!-- ===== CREAM ON TOP ===== -->
    <ellipse cx="130" cy="92" rx="48" ry="13" fill="#fff5f9"/>
    <path d="M90 90 Q100 80 111 88 Q120 79 130 87 Q140 78 149 87 Q160 80 170 90" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <path d="M90 90 Q100 80 111 88 Q120 79 130 87 Q140 78 149 87 Q160 80 170 90" fill="none" stroke="#ffe0ef" stroke-width="4" stroke-linecap="round"/>

    <!-- Strawberry on cream top -->
    <ellipse cx="112" cy="89" rx="8" ry="7" fill="#ef4444"/>
    <path d="M107 84 Q112 77 117 84" fill="#22c55e" stroke="#16a34a" stroke-width="0.5"/>
    <circle cx="110" cy="88" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="114" cy="91" r="1" fill="#fff" opacity="0.6"/>

    <ellipse cx="148" cy="89" rx="8" ry="7" fill="#ef4444"/>
    <path d="M143 84 Q148 77 153 84" fill="#22c55e" stroke="#16a34a" stroke-width="0.5"/>
    <circle cx="146" cy="88" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="150" cy="91" r="1" fill="#fff" opacity="0.6"/>

    <!-- ===== CANDLES ===== -->
    <!-- Candle A (left) x=105 -->
    <rect x="101" y="60" width="9" height="32" rx="3" fill="#c084fc"/>
    <rect x="101" y="60" width="9" height="9" rx="3" fill="#ddd6fe"/>
    <!-- stripe -->
    <rect x="101" y="68" width="9" height="3" rx="1" fill="#a855f7" opacity="0.5"/>
    <rect x="101" y="74" width="9" height="3" rx="1" fill="#a855f7" opacity="0.5"/>
    <rect x="101" y="80" width="9" height="3" rx="1" fill="#a855f7" opacity="0.5"/>
    <line x1="105.5" y1="60" x2="105.5" y2="54" stroke="#78716c" stroke-width="1.2"/>
    <g class="flame-g" id="fg-a">
      <ellipse class="flame-outer" cx="105.5" cy="49" rx="5" ry="8" fill="#fb923c" opacity="0.9"/>
      <ellipse class="flame-inner" cx="105.5" cy="51" rx="3" ry="5" fill="#fef08a" opacity="0.95"/>
      <ellipse cx="105.5" cy="52" rx="1.5" ry="2" fill="#fff" opacity="0.8"/>
    </g>
    <ellipse class="smoke-path" id="sp-a" cx="105.5" cy="54" rx="3" ry="4" fill="#d1d5db"/>

    <!-- Candle B (center) x=126 -->
    <rect x="122" y="56" width="9" height="36" rx="3" fill="#34d399"/>
    <rect x="122" y="56" width="9" height="9" rx="3" fill="#a7f3d0"/>
    <rect x="122" y="65" width="9" height="3" rx="1" fill="#059669" opacity="0.4"/>
    <rect x="122" y="71" width="9" height="3" rx="1" fill="#059669" opacity="0.4"/>
    <rect x="122" y="77" width="9" height="3" rx="1" fill="#059669" opacity="0.4"/>
    <rect x="122" y="83" width="9" height="3" rx="1" fill="#059669" opacity="0.4"/>
    <line x1="126.5" y1="56" x2="126.5" y2="50" stroke="#78716c" stroke-width="1.2"/>
    <g class="flame-g" id="fg-b">
      <ellipse class="flame-outer" cx="126.5" cy="45" rx="5" ry="8" fill="#fb923c" opacity="0.9"/>
      <ellipse class="flame-inner" cx="126.5" cy="47" rx="3" ry="5" fill="#fef08a" opacity="0.95"/>
      <ellipse cx="126.5" cy="48" rx="1.5" ry="2" fill="#fff" opacity="0.8"/>
    </g>
    <ellipse class="smoke-path" id="sp-b" cx="126.5" cy="50" rx="3" ry="4" fill="#d1d5db"/>

    <!-- Candle C (right) x=146 -->
    <rect x="142" y="60" width="9" height="32" rx="3" fill="#f472b6"/>
    <rect x="142" y="60" width="9" height="9" rx="3" fill="#fbcfe8"/>
    <rect x="142" y="68" width="9" height="3" rx="1" fill="#db2777" opacity="0.4"/>
    <rect x="142" y="74" width="9" height="3" rx="1" fill="#db2777" opacity="0.4"/>
    <rect x="142" y="80" width="9" height="3" rx="1" fill="#db2777" opacity="0.4"/>
    <line x1="146.5" y1="60" x2="146.5" y2="54" stroke="#78716c" stroke-width="1.2"/>
    <g class="flame-g" id="fg-c">
      <ellipse class="flame-outer" cx="146.5" cy="49" rx="5" ry="8" fill="#fb923c" opacity="0.9"/>
      <ellipse class="flame-inner" cx="146.5" cy="51" rx="3" ry="5" fill="#fef08a" opacity="0.95"/>
      <ellipse cx="146.5" cy="52" rx="1.5" ry="2" fill="#fff" opacity="0.8"/>
    </g>
    <ellipse class="smoke-path" id="sp-c" cx="146.5" cy="54" rx="3" ry="4" fill="#d1d5db"/>
  </svg>

  <div id="hint"></div>
</div>

<script>
  let state = 'lit'; // 'lit' | 'blown'

  function toggleCake() {
    if (state === 'lit') {
      blowOut();
      state = 'blown';
    } else {
      relight();
      state = 'lit';
    }
  }

  function blowOut() {
    document.getElementById('hint').classList.add('hide');

    ['a','b','c'].forEach((id, i) => {
      setTimeout(() => {
        document.getElementById('fg-' + id).classList.add('blown');
        const sp = document.getElementById('sp-' + id);
        sp.classList.add('show');
        setTimeout(() => sp.classList.remove('show'), 1300);
      }, i * 160);
    });

    setTimeout(() => {
      launchConfetti();
    }, 700);
  }

  function relight() {
    document.getElementById('hint').classList.remove('hide');
    document.getElementById('hint').textContent = '';

    ['a','b','c'].forEach(id => {
      document.getElementById('fg-' + id).classList.remove('blown');
    });

    document.querySelectorAll('.confetti, .sparkle-star').forEach(el => el.remove());
  }

  const confColors = ['#f472b6','#a78bfa','#34d399','#fbbf24','#60a5fa','#fb7185','#c084fc','#4ade80','#f97316'];

  function launchConfetti() {
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti';
        const sz = Math.random() * 9 + 4;
        const isCircle = Math.random() > 0.45;
        el.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -16px;
          width: ${sz}px;
          height: ${isCircle ? sz : sz * 0.4}px;
          border-radius: ${isCircle ? '50%' : '2px'};
          background: ${confColors[Math.floor(Math.random() * confColors.length)]};
          animation-duration: ${1.6 + Math.random() * 2}s;
          animation-delay: ${Math.random() * 0.6}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }, i * 22);
    }

    // Sparkle stars around cake
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const emojis = ['✨','⭐','🌟','💫','🌸'];
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'sparkle-star';
        const angle = Math.random() * Math.PI * 2;
        const r = 80 + Math.random() * 100;
        el.style.left = (cx + Math.cos(angle) * r - 12) + 'px';
        el.style.top  = (cy + Math.sin(angle) * r - 12) + 'px';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }, i * 60);
    }
  }
</script>
</body>
</html>
